services:
  db:
    image: postgres:16-alpine
    container_name: prodexa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prodexa}
      POSTGRES_USER: ${POSTGRES_USER:-prodexa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prodexa}
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-prodexa} -d ${POSTGRES_DB:-prodexa}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prodexa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: prodexa-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://prodexa:prodexa@db:5432/prodexa?schema=public}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: prodexa-frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    depends_on:
      - backend
    ports:
      - '3001:3000'

volumes:
  postgres_data:
